<!doctype html>
<html lang="nb">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      id="meta-viewport"
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover"
    />
    <meta name="description" content="Scanix – GPS, kart og logg" />
    <meta name="theme-color" content="#0e1422" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Scanix" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <!-- Kritisk: mørk flate før CSS laster (splash + app-logo styres i style.css / launchTransition.js) -->
    <style>
      #app-launch {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        z-index: 2147483646;
        margin: 0;
        min-height: 100vh;
        min-height: 100dvh;
        min-height: 100svh;
        min-height: -webkit-fill-available;
        width: 100%;
        min-width: 100%;
        box-sizing: border-box;
        background: #000000;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 0px)
          env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 0px);
      }
      #app-launch .app-launch__logo {
        opacity: 0;
        max-height: min(44vh, 260px);
        width: auto;
        max-width: min(92vw, 26rem);
        object-fit: contain;
      }
    </style>
    <title>Scanix</title>
  </head>
  <body>
    <div id="app-launch" class="app-launch" aria-hidden="true">
      <img
        class="app-launch__logo"
        src="/assets/app-logo-launch.png"
        alt=""
        width="280"
        height="280"
        decoding="async"
        fetchpriority="high"
      />
    </div>
    <div id="app"></div>
    <script type="module" src="/src/boot.js"></script>
  </body>
</html>
